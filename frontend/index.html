<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocalChat - 社内チャット</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg" />
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <!-- ログイン/登録画面 -->
  <div id="auth-view" class="auth-view">
    <div class="auth-card">
      <img src="/static/logo.svg" alt="LocalChat" class="auth-logo-img" width="56" height="56" />
      <h1 class="auth-logo">LocalChat</h1>
      <p class="auth-sub">完全オフライン 社内チャット</p>

      <div id="auth-tabs" class="auth-tabs">
        <button class="auth-tab active" data-mode="login">ログイン</button>
        <button class="auth-tab" data-mode="register">新規登録</button>
      </div>

      <form id="auth-form" class="auth-form">
        <label>ユーザー名
          <input type="text" id="auth-username" autocomplete="username" required />
        </label>
        <label id="displayname-field" style="display:none;">表示名
          <input type="text" id="auth-displayname" autocomplete="name" />
        </label>
        <label>パスワード
          <input type="password" id="auth-password" autocomplete="current-password" required />
        </label>
        <div id="auth-error" class="auth-error"></div>
        <button type="submit" id="auth-submit" class="btn-primary">ログイン</button>
        <button type="button" id="auth-back" class="btn-secondary" style="display:none;width:100%;margin-top:8px;">既存アカウントに戻る</button>
      </form>
    </div>
  </div>

  <!-- メインアプリ -->
  <div id="app-view" class="app-view" style="display:none;">
    <!-- サーバー一覧（左端） -->
    <nav class="server-bar">
      <div class="server-icon home-icon" id="dm-home" title="ダイレクトメッセージ">DM</div>
      <div class="server-divider"></div>
      <div id="server-list"></div>
      <div class="server-icon add-server" id="add-server" title="サーバーを追加">+</div>
    </nav>

    <!-- チャンネル一覧 -->
    <aside class="channel-bar">
      <header class="channel-header">
        <span id="current-server-name">LocalChat</span>
        <button id="open-invite" class="mini-btn" title="メンバーを招待" style="margin-left:auto;display:none;">👤＋</button>
      </header>
      <div class="channel-list-wrap">
        <div id="channel-section" class="channel-section">
          <div class="channel-section-title">
            <span>テキストチャンネル</span>
            <button id="add-channel" class="mini-btn" title="チャンネル追加">+</button>
          </div>
          <div id="channel-list"></div>
        </div>
        <div id="dm-section" class="channel-section" style="display:none;">
          <div class="channel-section-title">
            <span>ダイレクトメッセージ</span>
            <button id="add-dm" class="mini-btn" title="DMを開始">+</button>
          </div>
          <div id="dm-list"></div>
        </div>
      </div>

      <!-- 自分のプロフィール -->
      <div class="user-panel">
        <div class="avatar" id="my-avatar"></div>
        <div class="user-panel-info">
          <div class="user-panel-name" id="my-name">-</div>
          <div class="user-panel-status" id="my-status">オンライン</div>
        </div>
        <button id="theme-toggle" class="mini-btn" title="テーマ切り替え">🌙</button>
        <button id="open-help" class="mini-btn" title="使い方・Tips">💡</button>
        <button id="open-profile" class="mini-btn" title="プロフィール設定">⚙</button>
      </div>
    </aside>

    <!-- チャンネル一覧パネルの幅変更ハンドル -->
    <div class="resizer" id="channel-resizer" title="ドラッグで幅を調整"></div>

    <!-- メインチャット領域 -->
    <main class="chat-area">
      <header class="chat-header">
        <span class="chat-title" id="chat-title">#チャンネルを選択</span>
        <span class="chat-topic" id="chat-topic"></span>
        <div class="chat-header-actions">
          <button id="toggle-members" class="mini-btn" title="メンバー">👥</button>
        </div>
      </header>

      <div class="messages" id="messages"></div>

      <div class="composer-wrap">
        <div id="reply-banner" class="reply-banner" style="display:none;">
          <span id="reply-text"></span>
          <button id="cancel-reply" class="mini-btn">✕</button>
        </div>
        <div id="attachment-preview" class="attachment-preview"></div>
        <div class="composer">
          <button id="upload-btn" class="composer-btn" title="ファイル添付">＋</button>
          <input type="file" id="file-input" style="display:none;" />
          <textarea id="message-input" placeholder="メッセージを入力 (Markdown・@メンション対応／Shift+Enterで改行)" rows="1"></textarea>
          <button id="emoji-btn" class="composer-btn" title="絵文字">😊</button>
          <button id="send-btn" class="composer-btn send" title="送信">➤</button>
        </div>
        <div id="emoji-picker" class="emoji-picker" style="display:none;"></div>
      </div>
    </main>

    <!-- メンバー一覧（右） -->
    <aside class="member-bar" id="member-bar" style="display:none;">
      <div class="member-section-title">メンバー</div>
      <div id="member-list"></div>
    </aside>
  </div>

  <!-- モーダル -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal" id="modal"></div>
  </div>

  <script src="/static/vendor/mermaid.min.js"></script>
  <script src="/static/js/markdown.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
